version: 2
models:

- name: customer_churn_risk_mart
  description: Model for customer_churn_risk_mart
  config:
    materialized: incremental
    incremental_strategy: append
  columns:
  - name: customer_id
    data_type: integer
    description: 고객의 기본 키
  - name: customer_name
    data_type: character varying(255)
    description: 고객 이름
  - name: customer_email
    data_type: character varying(255)
    description: 고객 이메일
  - name: registration_date
    data_type: date
    description: 고객 등록일
  - name: last_order_date
    data_type: timestamp without time zone
    description: 고객의 마지막 주문 날짜
  - name: days_since_last_order
    data_type: integer
    description: 고객의 마지막 주문 이후 경과일
  - name: total_orders
    data_type: bigint
    description: 고객의 총 주문 건수
  - name: avg_order_value
    data_type: numeric(10,2)
    description: 고객 주문의 평균 가치
  - name: churn_risk_score
    data_type: numeric(10,2)
    description: 계산된 이탈 위험 점수
  - name: churn_risk_segment
    data_type: character varying(255)
    description: 이탈 위험 세그먼트 (낮음, 중간, 높음)
  - name: analysis_date
    data_type: date
    description: 이탈 위험 분석 수행 날짜
  - name: dbt_dtm
    description: dbt 적재 일시
    data_type: timestamp without time zone
- name: customer_receipt_mart
  description: Model for customer_receipt_mart
  config:
    materialized: incremental
    incremental_strategy: append
    unique_key:
    - customer_id
  columns:
  - name: customer_id
    data_type: integer
    description: 고객 ID (기본 키)
  - name: customer_name
    data_type: character varying(255)
    description: 고객 이름
  - name: customer_email
    data_type: character varying(255)
    description: 고객 이메일
  - name: first_order_date
    data_type: date
    description: 고객의 첫 주문 날짜
  - name: last_order_date
    data_type: date
    description: 고객의 마지막 주문 날짜
  - name: total_receipt_count
    data_type: bigint
    description: 고객의 총 주문 건수
  - name: total_items_purchased
    data_type: bigint
    description: 고객이 구매한 총 상품 수량
  - name: total_spend_amount
    data_type: numeric(18,2)
    description: 고객의 총 지출 금액
  - name: average_item_price
    data_type: numeric(10,2)
    description: 고객이 구매한 상품의 평균 가격
  - name: dbt_dtm
    description: dbt 적재 일시
    data_type: timestamp without time zone
- name: orders_customers_mart
  description: Model for orders_customers_mart
  config:
    materialized: incremental
    incremental_strategy: append
  columns:
  - name: order_id
    data_type: integer
    description: 주문의 기본 키
  - name: customer_id
    data_type: integer
    description: 고객에 대한 외래 키
  - name: customer_name
    data_type: character varying(255)
    description: 고객 이름
  - name: customer_email
    data_type: character varying(255)
    description: 고객 이메일
  - name: order_date
    data_type: timestamp without time zone
    description: 주문 날짜
  - name: total_amount
    data_type: numeric(10,2)
    description: 주문 총액
  - name: registration_date
    data_type: date
    description: 고객 등록일
  - name: dbt_dtm
    description: dbt 적재 일시
    data_type: timestamp without time zone
- name: orders_mart
  description: Model for orders_mart
  config:
    materialized: incremental
    incremental_strategy: append
  columns:
  - name: order_id
    data_type: integer
    description: 주문의 기본 키
  - name: customer_id
    data_type: integer
    description: 고객에 대한 외래 키
  - name: order_date
    data_type: timestamp without time zone
    description: 주문 날짜
  - name: total_amount
    data_type: numeric(10,2)
    description: 주문 총액
  - name: product_id
    data_type: integer
    description: 상품 ID
  - name: quantity
    data_type: integer
    description: 상품 수량
  - name: price
    data_type: numeric(10,2)
    description: 상품 가격
  - name: item_total
    data_type: numeric(10,2)
    description: 항목별 총액
  - name: dbt_dtm
    description: dbt 적재 일시
    data_type: timestamp without time zone
- name: orders_products_mart
  description: Model for orders_products_mart
  config:
    materialized: incremental
    incremental_strategy: append
  columns:
  - name: order_id
    data_type: integer
    description: 주문의 기본 키
  - name: customer_id
    data_type: integer
    description: 고객에 대한 외래 키
  - name: order_date
    data_type: timestamp without time zone
    description: 주문 날짜
  - name: total_amount
    data_type: numeric(10,2)
    description: 주문 총액
  - name: product_id
    data_type: integer
    description: 상품에 대한 외래 키
  - name: product_name
    data_type: character varying(255)
    description: 상품 이름
  - name: product_category
    data_type: character varying(255)
    description: 상품 카테고리
  - name: item_price
    data_type: numeric(10,2)
    description: 주문 항목의 상품 가격
  - name: product_price
    data_type: numeric(10,2)
    description: 상품의 현재 가격
  - name: quantity
    data_type: integer
    description: 주문 항목의 상품 수량
  - name: product_created_date
    data_type: date
    description: 상품 생성일
  - name: dbt_dtm
    description: dbt 적재 일시
    data_type: timestamp without time zone
- name: purchase_order_summary
  description: Model for purchase_order_summary
  config:
    materialized: incremental
    incremental_strategy: append
  columns:
  - name: customer_id
    data_type: integer
    description: 고객 고유 ID
  - name: customer_name
    data_type: character varying(255)
    description: 고객 이름
  - name: total_purchase_orders
    data_type: bigint
    description: 총 발주 횟수
  - name: total_purchase_amount
    data_type: numeric(10,2)
    description: 총 발주 금액
  - name: pending_orders
    data_type: bigint
    description: 대기 중인 발주 횟수
  - name: completed_orders
    data_type: bigint
    description: 완료된 발주 횟수
  - name: canceled_orders
    data_type: bigint
    description: 취소된 발주 횟수
  - name: first_purchase_order_date
    data_type: timestamp without time zone
    description: 첫 발주 날짜
  - name: last_purchase_order_date
    data_type: timestamp without time zone
    description: 마지막 발주 날짜
  - name: dbt_dtm
    description: dbt 적재 일시
    data_type: timestamp without time zone
